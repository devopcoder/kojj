<!-- [REST OF HTML IDENTICAL] -->

<script>
  // ===== YOUR NEW GOOGLE SHEET URL - REPLACE THIS! =====
  const GSHEET_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzqBfO18HBwQCaxcEI71sPLe1vUYcaPqxQWqePJEBgNyh0oRw8rJi3q_Rd8ucF0LCJ5/exec';
  
  // ADMIN CREDENTIALS
  const ADMIN_USER = 'admin';
  const ADMIN_PASS = 'admin123';
  
  let isLoggedIn = false;
  let entries = [];
  let countdownVal = 30;
  let countdownInterval = null;
  let searchVal = '';

  // ===== STEP 1: CREATE GOOGLE APPS SCRIPT (FOLLOW THESE STEPS) =====
  /*
  1. Go to https://script.google.com
  2. Create NEW PROJECT
  3. Replace ALL code with this:

    try {
      const sheet = SpreadsheetApp.openById('YOUR_SHEET_ID').getActiveSheet();
      const data = e.parameter;
      
      // ADD NEW ENTRY
      if (!data.action) {
        const row = [
          new Date(),
          data.name || '',
          data.age || '',
          data.email || '',

          data.region || '',

          data.lat || '',
          data.lon || '',
          data.timezone || ''
        ];
        sheet.appendRow(row);
        return ContentService.createTextOutput('SUCCESS').setMimeType(ContentService.MimeType.TEXT);
      }
      
      // READ ALL ENTRIES
      if (data.action === 'read') {
        const rows = sheet.getDataRange().getValues();
        const entries = rows.slice(1).map(row => ({
          id: row[0].getTime(),
          time: row[0],
          name: row[1],
          age: row[2],
          email: row[3],
          ip: row[4],
          country: row[5],
          region: row[6],
          city: row[7],
          lat: row[8],
          lon: row[9],
          timezone: row[10]
        }));
        return ContentService.createTextOutput(JSON.stringify({entries}))
          .setMimeType(ContentService.MimeType.JSON);
      }
      
      return ContentService.createTextOutput('ERROR');
    } catch (error) {
      return ContentService.createTextOutput('ERROR: ' + error.toString());
    }
  }
  
  4. SAVE PROJECT (Ctrl+S)
  5. Click DEPLOY → New Deployment
  6. Type: Web app
  7. Execute as: Me
  8. Who has access: Anyone
  9. Click DEPLOY → Copy WEB APP URL
  10. Paste URL in GSHEET_SCRIPT_URL above (replace YOUR_SCRIPT_ID)
  */

  // ===== IP GEOLOCATION (UNCHANGED) =====
  async function detectIPGeo() {
    try {
      const ipResponse = await fetch('https://ipapi.co/json/');
      const ipData = await ipResponse.json();
      
      document.getElementById('f_ip').value = ipData.ip || 'Unknown';
      
      const geoResponse = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
      const geoData = await geoResponse.json();
      
      document.getElementById('f_country').value = geoData.country_name || '';
      document.getElementById('f_region').value = geoData.region || '';
      document.getElementById('f_city').value = geoData.city || '';
      document.getElementById('f_lat').value = geoData.latitude || '';
      document.getElementById('f_lon').value = geoData.longitude || '';
      document.getElementById('f_timezone').value = geoData.timezone || '';
      
    } catch (error) {
      try {
        const fallbackIP = await fetch('https://api.ipify.org?format=json');
        const ipData = await fallbackIP.json();
        document.getElementById('f_ip').value = ipData.ip;
      } catch (e) {
        document.getElementById('f_ip').value = 'Unknown';
      }
    }
  }

  // ===== GOOGLE SHEET FUNCTIONS (IMPROVED) =====
  async function sendToGoogleSheet(entry) {
    try {
      const params = new URLSearchParams();
      Object.keys(entry).forEach(key => {
        params.append(key, entry[key]);
      });
      
      const response = await fetch(GSHEET_SCRIPT_URL, {
        method: 'POST',
        body: params
      });
      
      return response.ok && response.text() === 'SUCCESS';
    } catch (error) {
      console.error('Sheet POST Error:', error);
      return false;
    }
  }

  async function loadFromGoogleSheet() {
    try {
      const response = await fetch(`${GSHEET_SCRIPT_URL}?action=read`);
      if (!response.ok) return [];
      
      const data = await response.json();
      return data.entries || [];
    } catch (error) {
      console.error('Sheet GET Error:', error);
      return [];
    }
  }

  // ===== ALL YOUR EXISTING FUNCTIONS (UNCHANGED) =====
  function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

    if (page === 'form') {
      document.getElementById('pageForm').classList.add('active');
      document.getElementById('navForm').classList.add('active');
    } else if (page === 'login') {
      if (isLoggedIn) { showPage('admin'); return; }
      document.getElementById('pageLogin').classList.add('active');
      document.getElementById('navAdmin').classList.add('active');
      document.getElementById('loginErr').style.display = 'none';
    } else if (page === 'admin') {
      if (!isLoggedIn) { showPage('login'); return; }
      document.getElementById('pageAdmin').classList.add('active');
      document.getElementById('navAdmin').classList.add('active');
      loadEntries();
    }
  }

  async function submitForm() {
    const name = document.getElementById('f_name').value.trim();
    const age = document.getElementById('f_age').value.trim();
    const email = document.getElementById('f_email').value.trim();

    if (!name || !age || !email) {
      alert('⚠ Please fill in all fields.');
      return;
    }

    if (isNaN(age) || +age < 13 || +age > 99) {
      alert('⚠ Age must be between 13–99.');
      return;
    }

    const entry = {
      id: Date.now(),
      name,
      age: +age,
      email,
      ip: document.getElementById('f_ip').value || 'Unknown',
      country: document.getElementById('f_country').value || '',
      region: document.getElementById('f_region').value || '',
      city: document.getElementById('f_city').value || '',
      lat: document.getElementById('f_lat').value || '',
      lon: document.getElementById('f_lon').value || '',
      timezone: document.getElementById('f_timezone').value || '',
      time: new Date().toISOString()
    };

    const sheetSuccess = await sendToGoogleSheet(entry);
    
    document.getElementById('f_name').value = '';
    document.getElementById('f_age').value = '';
    document.getElementById('f_email').value = '';

    const toast = document.getElementById('toast');
    if (sheetSuccess) {
      toast.textContent = '✓ ENTRY SUBMITTED SUCCESSFULLY';
    } else {
      toast.textContent = '⚠ SUBMISSION FAILED - TRY AGAIN';
      toast.style.background = '#1a0000';
      toast.style.borderColor = 'var(--red)';
      toast.style.color = 'var(--red)';
    }
    toast.style.display = 'block';
    setTimeout(() => { 
      toast.style.display = 'none';
      toast.style.background = '#001a09';
      toast.style.borderColor = 'var(--green)';
      toast.style.color = 'var(--green)';
    }, 3000);

    setTimeout(detectIPGeo, 1000);
  }

  // [ALL OTHER FUNCTIONS REMAIN IDENTICAL - doLogin, renderTable, etc.]
  function doLogin() {
    const u = document.getElementById('l_user').value.trim();
    const p = document.getElementById('l_pass').value.trim();

    if (u === ADMIN_USER && p === ADMIN_PASS) {
      isLoggedIn = true;
      document.getElementById('loginErr').style.display = 'none';
      document.getElementById('l_user').value = '';
      document.getElementById('l_pass').value = '';
      showPage('admin');
    } else {
      document.getElementById('loginErr').style.display = 'block';
      document.getElementById('l_pass').value = '';
    }
  }

  function doLogout() {
    isLoggedIn = false;
    clearInterval(countdownInterval);
    showPage('form');
  }

  async function loadEntries() {
    entries = await loadFromGoogleSheet();
    renderTable();
    updateStats();
    document.getElementById('statTime').textContent = new Date().toLocaleTimeString('en-PH', { 
      hour: '2-digit', minute: '2-digit', second: '2-digit' 
    });
  }

  // [Include all your other functions: renderTable, deleteEntry, etc. - they work perfectly]

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  window.addEventListener('load', async () => {
    await detectIPGeo();
    showPage('form');
  });
</script>
</body>
